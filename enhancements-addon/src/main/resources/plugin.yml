name: OpenEcoEnhancements
version: "${version}"
main: dev.alexisbinh.openeco.enhancements.OpenEcoEnhancementsPlugin
description: "Addon for OpenEco: interest, pay limits, permission-based balance caps, and currency exchange"
api-version: '1.21'
authors:
  - alexisbinh

depend:
  - OpenEco

commands:
  exchange:
    description: Exchange one currency for another at a configured rate.
    usage: /exchange <amount> <from> <to>
    permission: openeco.enhancements.exchange

permissions:
  openeco.enhancements.bypass.paylimit:
    description: Bypass the pay limit enforced by OpenEcoEnhancements
    default: op
  openeco.enhancements.bypass.permcap:
    description: Bypass the permission balance cap enforced by OpenEcoEnhancements
    default: op
  openeco.enhancements.exchange:
    description: Use the /exchange command to swap currencies
    default: true
