name: SimpleEcoEnhancements
version: "${version}"
main: dev.alexisbinh.simpleeco.enhancements.SimpleEcoEnhancementsPlugin
description: "Addon for SimpleEco: interest, pay limits, and permission-based balance caps"
api-version: '1.21'
authors:
  - alexisbinh

depend:
  - SimpleEco

permissions:
  simpleeco.enhancements.bypass.paylimit:
    description: Bypass the pay limit enforced by SimpleEcoEnhancements
    default: op
  simpleeco.enhancements.bypass.permcap:
    description: Bypass the permission balance cap enforced by SimpleEcoEnhancements
    default: op
