name: SimpleEcoEnhancements
version: "${version}"
main: dev.alexisbinh.simpleeco.enhancements.SimpleEcoEnhancementsPlugin
description: "Addon for SimpleEco: interest, pay limits, permission-based balance caps, and currency exchange"
api-version: '1.21'
authors:
  - alexisbinh

depend:
  - SimpleEco

commands:
  exchange:
    description: Exchange one currency for another at a configured rate.
    usage: /exchange <amount> <from> <to>
    permission: simpleeco.enhancements.exchange

permissions:
  simpleeco.enhancements.bypass.paylimit:
    description: Bypass the pay limit enforced by SimpleEcoEnhancements
    default: op
  simpleeco.enhancements.bypass.permcap:
    description: Bypass the permission balance cap enforced by SimpleEcoEnhancements
    default: op
  simpleeco.enhancements.exchange:
    description: Use the /exchange command to swap currencies
    default: true
